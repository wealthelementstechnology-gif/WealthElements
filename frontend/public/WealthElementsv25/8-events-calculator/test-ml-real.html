<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Real ML System - Wealth Elements</title>
  <link rel="stylesheet" href="../design-system.css">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
  <script src="outcome-tracker.js"></script>
  <script src="ml-features.js"></script>
  <script src="ml-model.js"></script>
  <style>
    body {
      background: #f3f4f6;
      padding: 40px 20px;
    }
    .test-container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .test-header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 2px solid #e5e7eb;
    }
    .test-header h1 {
      font-size: 32px;
      color: #111827;
      margin-bottom: 12px;
    }
    .test-header p {
      color: #6b7280;
      font-size: 16px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .status-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      border-radius: 12px;
    }
    .status-card.warning {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    }
    .status-card.success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }
    .status-card-label {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 8px;
    }
    .status-card-value {
      font-size: 32px;
      font-weight: 700;
    }
    .btn-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .action-btn {
      padding: 20px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .action-btn:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .action-btn-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .action-btn-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }
    .action-btn-desc {
      font-size: 14px;
      color: #6b7280;
    }
    .results-section {
      background: #f9fafb;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .results-title {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 16px;
    }
    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .comparison-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      border-left: 4px solid #667eea;
    }
    .comparison-card.ml {
      border-left-color: #10b981;
    }
    .comparison-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .comparison-data {
      font-size: 14px;
      color: #111827;
      line-height: 1.8;
    }
    .comparison-data strong {
      font-weight: 600;
    }
    pre {
      background: #1f2937;
      color: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-success {
      background: #d1fae5;
      color: #065f46;
    }
    .badge-warning {
      background: #fef3c7;
      color: #92400e;
    }
    .badge-error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <div class="test-header">
      <h1>🔬 Real ML System Test</h1>
      <p>Check if ML optimization is working in your actual Wealth Elements app</p>
    </div>

    <div class="status-grid">
      <div class="status-card" id="statusTensorFlow">
        <div class="status-card-label">TensorFlow.js Status</div>
        <div class="status-card-value" id="tfStatus">Loading...</div>
      </div>
      <div class="status-card warning" id="statusModel">
        <div class="status-card-label">ML Model Status</div>
        <div class="status-card-value" id="modelStatus">Checking...</div>
      </div>
      <div class="status-card" id="statusData">
        <div class="status-card-label">Training Data</div>
        <div class="status-card-value" id="dataCount">0 samples</div>
      </div>
      <div class="status-card" id="statusMode">
        <div class="status-card-label">Current Mode</div>
        <div class="status-card-value" id="currentMode">Rule-Based</div>
      </div>
    </div>

    <div class="btn-section">
      <button class="action-btn" onclick="checkSystem()">
        <div class="action-btn-icon">🔍</div>
        <div class="action-btn-title">Check System Status</div>
        <div class="action-btn-desc">Verify ML infrastructure is loaded</div>
      </button>

      <button class="action-btn" onclick="generateTrainingData()">
        <div class="action-btn-icon">🎲</div>
        <div class="action-btn-title">Generate Training Data</div>
        <div class="action-btn-desc">Create 100 synthetic samples</div>
      </button>

      <button class="action-btn" onclick="trainModel()">
        <div class="action-btn-icon">🎓</div>
        <div class="action-btn-title">Train ML Model</div>
        <div class="action-btn-desc">Train neural network (needs 50+ samples)</div>
      </button>

      <button class="action-btn" onclick="testPredictions()">
        <div class="action-btn-icon">🤖</div>
        <div class="action-btn-title">Test Predictions</div>
        <div class="action-btn-desc">Compare ML vs Rule-based predictions</div>
      </button>

      <button class="action-btn" onclick="viewData()">
        <div class="action-btn-icon">📊</div>
        <div class="action-btn-title">View Training Data</div>
        <div class="action-btn-desc">See collected optimization records</div>
      </button>

      <button class="action-btn" onclick="deleteModel()">
        <div class="action-btn-icon">🗑️</div>
        <div class="action-btn-title">Reset ML Model</div>
        <div class="action-btn-desc">Delete model and start fresh</div>
      </button>
    </div>

    <div class="results-section" id="results" style="display: none;">
      <div class="results-title">Test Results</div>
      <div id="resultsContent"></div>
    </div>
  </div>

  <script>
    let mlModel, outcomeTracker, featureExtractor;

    window.addEventListener('load', async () => {
      await new Promise(resolve => setTimeout(resolve, 1000));

      mlModel = window.mlModel;
      outcomeTracker = window.outcomeTracker;
      featureExtractor = window.featureExtractor;

      await checkSystem();
    });

    async function checkSystem() {
      const results = document.getElementById('resultsContent');
      results.innerHTML = '<p>Checking system...</p>';
      document.getElementById('results').style.display = 'block';

      let report = '<h3>System Status Report</h3>';

      // Check TensorFlow
      if (typeof tf !== 'undefined') {
        document.getElementById('tfStatus').textContent = '✅ Loaded';
        document.getElementById('statusTensorFlow').className = 'status-card success';
        report += `<p>✅ <strong>TensorFlow.js:</strong> Version ${tf.version.tfjs}</p>`;
      } else {
        document.getElementById('tfStatus').textContent = '❌ Not Loaded';
        document.getElementById('statusTensorFlow').className = 'status-card warning';
        report += '<p>❌ <strong>TensorFlow.js:</strong> Not loaded (will use rules)</p>';
      }

      // Check ML Model
      if (mlModel) {
        const modelInfo = mlModel.getModelInfo();
        report += `<p>✅ <strong>ML Model:</strong> Initialized</p>`;
        report += `<p>&nbsp;&nbsp;&nbsp;├─ Loaded: ${modelInfo.loaded ? 'Yes' : 'No'}</p>`;
        report += `<p>&nbsp;&nbsp;&nbsp;├─ Fallback Mode: ${modelInfo.fallbackMode ? 'Yes (using rules)' : 'No (using ML)'}</p>`;
        report += `<p>&nbsp;&nbsp;&nbsp;└─ Version: ${modelInfo.version}</p>`;

        if (modelInfo.loaded) {
          document.getElementById('modelStatus').textContent = '✅ ML Active';
          document.getElementById('statusModel').className = 'status-card success';
          document.getElementById('currentMode').textContent = '🤖 ML Mode';
          document.getElementById('statusMode').className = 'status-card success';
        } else {
          document.getElementById('modelStatus').textContent = '📏 Rules Only';
          document.getElementById('statusModel').className = 'status-card warning';
          document.getElementById('currentMode').textContent = '📏 Rules Mode';
          document.getElementById('statusMode').className = 'status-card warning';
        }

        if (modelInfo.metadata) {
          report += '<p><strong>Model Training Info:</strong></p>';
          report += `<pre>${JSON.stringify(modelInfo.metadata, null, 2)}</pre>`;
        }
      } else {
        report += '<p>❌ <strong>ML Model:</strong> Not initialized</p>';
      }

      // Check Outcome Tracker
      if (outcomeTracker) {
        const stats = outcomeTracker.getStatistics();
        report += `<p>✅ <strong>Outcome Tracker:</strong> Active</p>`;
        report += `<p>&nbsp;&nbsp;&nbsp;├─ Total Optimizations: ${stats.totalOptimizations}</p>`;
        report += `<p>&nbsp;&nbsp;&nbsp;├─ Accepted: ${stats.acceptedOptimizations}</p>`;
        report += `<p>&nbsp;&nbsp;&nbsp;├─ Training Ready: ${stats.trainingReadySamples}</p>`;
        report += `<p>&nbsp;&nbsp;&nbsp;└─ Acceptance Rate: ${stats.acceptanceRate}%</p>`;

        document.getElementById('dataCount').textContent = `${stats.totalOptimizations} samples`;
        if (stats.totalOptimizations >= 50) {
          document.getElementById('statusData').className = 'status-card success';
        } else {
          document.getElementById('statusData').className = 'status-card warning';
        }
      } else {
        report += '<p>❌ <strong>Outcome Tracker:</strong> Not initialized</p>';
      }

      // Check Feature Extractor
      if (featureExtractor) {
        report += `<p>✅ <strong>Feature Extractor:</strong> Active (19 features)</p>`;
      } else {
        report += '<p>❌ <strong>Feature Extractor:</strong> Not initialized</p>';
      }

      results.innerHTML = report;
    }

    async function generateTrainingData() {
      if (!outcomeTracker) {
        alert('❌ Outcome tracker not initialized');
        return;
      }

      const confirm = window.confirm('Generate 100 synthetic training samples?\n\nThis will simulate 100 user optimizations with:\n- 75% acceptance rate\n- Realistic user profiles\n- Various goal types\n- Random feedback');

      if (!confirm) return;

      const results = document.getElementById('resultsContent');
      results.innerHTML = '<p>Generating training data... Please wait...</p>';
      document.getElementById('results').style.display = 'block';

      let generated = 0;
      const total = 100;

      for (let i = 0; i < total; i++) {
        const sample = generateSyntheticSample();
        outcomeTracker.recordOptimizationAttempt(sample);

        // Simulate user acceptance (75% accept)
        const accepted = Math.random() < 0.75;
        const sentiment = accepted ?
          (Math.random() < 0.7 ? 'positive' : 'neutral') :
          'negative';

        const id = outcomeTracker.records[outcomeTracker.records.length - 1].optimizationId;
        outcomeTracker.recordUserDecision(id, accepted, {
          sentiment: sentiment,
          comments: accepted ? 'Looks reasonable' : 'Too aggressive',
          timestamp: Date.now()
        });

        // Simulate follow-through for accepted ones
        if (accepted && Math.random() < 0.8) {
          outcomeTracker.recordOutcomeUpdate(id, {
            monthsFollowed: Math.floor(Math.random() * 12) + 3,
            planAbandoned: false,
            goalsAchieved: []
          });
        }

        generated++;
        if (generated % 10 === 0) {
          results.innerHTML = `<p>Generated ${generated} / ${total} samples...</p>`;
          await new Promise(resolve => setTimeout(resolve, 10));
        }
      }

      results.innerHTML = `<p>✅ <strong>Success!</strong> Generated ${generated} training samples</p>`;
      await checkSystem();
    }

    function generateSyntheticSample() {
      const ages = [25, 28, 32, 35, 38, 42, 45, 48];
      const incomes = [50000, 75000, 100000, 150000, 200000, 300000];
      const cities = ['mumbai', 'delhi', 'bangalore', 'chennai', 'pune', 'hyderabad'];
      const families = ['single', 'married', 'married_with_kids'];
      const risks = ['conservative', 'moderate', 'aggressive'];

      const age = ages[Math.floor(Math.random() * ages.length)];
      const income = incomes[Math.floor(Math.random() * incomes.length)];

      const originalGoals = [
        {
          name: 'Retirement Planning',
          type: 'retirement',
          priority: 'High',
          targetAmount: Math.random() * 50000000 + 30000000,
          yearsLeft: Math.floor(Math.random() * 20) + 15,
          requiredSIP: Math.random() * 30000 + 15000
        },
        {
          name: 'Child Education',
          type: 'education',
          priority: 'High',
          targetAmount: Math.random() * 5000000 + 3000000,
          yearsLeft: Math.floor(Math.random() * 10) + 10,
          requiredSIP: Math.random() * 15000 + 8000
        },
        {
          name: 'House Purchase',
          type: 'house',
          priority: 'Medium',
          targetAmount: Math.random() * 10000000 + 5000000,
          yearsLeft: Math.floor(Math.random() * 8) + 5,
          requiredSIP: Math.random() * 20000 + 10000
        },
        {
          name: 'Dream Vacation',
          type: 'vacation',
          priority: 'Low',
          targetAmount: Math.random() * 500000 + 300000,
          yearsLeft: Math.floor(Math.random() * 5) + 3,
          requiredSIP: Math.random() * 8000 + 3000
        }
      ];

      const totalSIP = originalGoals.reduce((sum, g) => sum + g.requiredSIP, 0);
      const budget = income * 0.30;
      const shortfall = Math.max(0, totalSIP - budget);

      const optimizedGoals = originalGoals.map(goal => ({
        ...goal,
        adjustments: {
          amountReductionPercent: Math.random() * 30,
          tenureExtensionYears: 0,
          sipReductionPercent: Math.random() * 30
        }
      }));

      return {
        userAge: age,
        monthlyIncome: income,
        monthlyExpenses: income * 0.60,
        city: cities[Math.floor(Math.random() * cities.length)],
        familyStatus: families[Math.floor(Math.random() * families.length)],
        riskProfile: risks[Math.floor(Math.random() * risks.length)],
        goals: optimizedGoals,
        originalGoals: originalGoals,
        stepUpBefore: 8,
        stepUpAfter: 10,
        investmentBudget: budget,
        originalTotalSIP: totalSIP,
        optimizedTotalSIP: budget - 500
      };
    }

    async function trainModel() {
      if (!mlModel || !outcomeTracker) {
        alert('❌ ML system not initialized');
        return;
      }

      const stats = outcomeTracker.getStatistics();
      if (stats.totalOptimizations < 50) {
        alert(`❌ Need at least 50 samples to train.\n\nCurrent: ${stats.totalOptimizations} samples\n\nClick "Generate Training Data" first.`);
        return;
      }

      const confirm = window.confirm(`Train ML model with ${stats.totalOptimizations} samples?\n\nThis will:\n- Extract features from all data\n- Train 3-layer neural network\n- Run 100 epochs\n- Save model to localStorage\n\nThis may take 2-5 minutes.`);

      if (!confirm) return;

      const results = document.getElementById('resultsContent');
      results.innerHTML = '<p>🎓 Training model... Please wait (this may take 2-5 minutes)...</p>';
      document.getElementById('results').style.display = 'block';

      try {
        const trainingData = outcomeTracker.exportForMLTraining();

        let progressHTML = '<p>Training in progress...</p><pre id="trainingProgress">Starting...</pre>';
        results.innerHTML = progressHTML;

        const history = await mlModel.trainModel(trainingData, {
          epochs: 100,
          batchSize: 32,
          onProgress: (epoch, logs) => {
            const progress = document.getElementById('trainingProgress');
            if (progress && epoch % 10 === 0) {
              progress.textContent = `Epoch ${epoch}/100\nLoss: ${logs.loss.toFixed(4)}\nValidation Loss: ${logs.val_loss.toFixed(4)}`;
            }
          }
        });

        results.innerHTML = `
          <p>✅ <strong>Training Complete!</strong></p>
          <p>Final Loss: ${history.metadata.finalLoss.toFixed(4)}</p>
          <p>Validation Loss: ${history.metadata.finalValLoss.toFixed(4)}</p>
          <p>Model saved to localStorage</p>
          <p><strong>Next:</strong> Click "Test Predictions" to see ML in action</p>
        `;

        await checkSystem();
      } catch (error) {
        results.innerHTML = `<p>❌ <strong>Training Failed:</strong> ${error.message}</p>`;
        console.error('Training error:', error);
      }
    }

    async function testPredictions() {
      if (!mlModel || !featureExtractor) {
        alert('❌ ML system not initialized');
        return;
      }

      const results = document.getElementById('resultsContent');
      results.innerHTML = '<p>Testing predictions...</p>';
      document.getElementById('results').style.display = 'block';

      // Test scenario: Young aggressive investor with vacation goal
      const testGoal = {
        name: 'Bali Vacation',
        type: 'vacation',
        priority: 'Low',
        fv: 500000,
        targetAmount: 500000,
        yearsLeft: 5,
        sip: 7000,
        requiredSIP: 7000
      };

      const testProfile = {
        age: 28,
        monthlyIncome: 150000,
        monthlyExpenses: 90000,
        investmentBudget: 50000,
        totalRequiredSIP: 65000,
        familyStatus: 'single',
        riskProfile: 'aggressive',
        city: 'bangalore',
        userId: 'test_user_123'
      };

      const allGoals = [
        testGoal,
        { name: 'Retirement', type: 'retirement', priority: 'High', sip: 25000 },
        { name: 'Education', type: 'education', priority: 'High', sip: 15000 }
      ];

      const historicalData = outcomeTracker.getAllRecords();

      try {
        // Get prediction (will use ML if trained, rules otherwise)
        const prediction = await mlModel.predictConstraints(testGoal, testProfile, allGoals, historicalData);

        // Always get rule-based for comparison
        const ruleBased = mlModel.ruleBasedConstraints(testGoal);

        let html = '<div class="comparison-grid">';

        html += '<div class="comparison-card">';
        html += '<div class="comparison-label">📏 Rule-Based Prediction</div>';
        html += '<div class="comparison-data">';
        html += `<strong>Max Reduction:</strong> ${(ruleBased.maxAmountReduction * 100).toFixed(0)}%<br>`;
        html += `<strong>Max Extension:</strong> ${ruleBased.maxTenureExtension} years<br>`;
        html += `<strong>Confidence:</strong> ${(ruleBased.confidence * 100).toFixed(0)}%<br>`;
        html += `<strong>Source:</strong> <span class="badge badge-warning">Hardcoded Rules</span>`;
        html += '</div></div>';

        html += '<div class="comparison-card ml">';
        html += '<div class="comparison-label">🤖 Current System Prediction</div>';
        html += '<div class="comparison-data">';
        html += `<strong>Max Reduction:</strong> ${(prediction.maxAmountReduction * 100).toFixed(0)}%<br>`;
        html += `<strong>Max Extension:</strong> ${prediction.maxTenureExtension} years<br>`;
        html += `<strong>Confidence:</strong> ${(prediction.confidence * 100).toFixed(0)}%<br>`;
        html += `<strong>Source:</strong> ${prediction.source === 'ml_model' ? '<span class="badge badge-success">🤖 ML Model</span>' : '<span class="badge badge-warning">📏 Rules</span>'}`;
        html += '</div></div>';

        html += '</div>';

        if (prediction.source === 'ml_model') {
          html += '<p style="margin-top: 20px; padding: 16px; background: #d1fae5; border-radius: 8px; color: #065f46;"><strong>✅ ML Model is ACTIVE and making predictions!</strong></p>';
        } else {
          html += '<p style="margin-top: 20px; padding: 16px; background: #fef3c7; border-radius: 8px; color: #92400e;"><strong>⚠️ Currently using rule-based fallback.</strong> Train the model to activate ML predictions.</p>';
        }

        results.innerHTML = html;
      } catch (error) {
        results.innerHTML = `<p>❌ <strong>Error:</strong> ${error.message}</p>`;
        console.error('Prediction error:', error);
      }
    }

    function viewData() {
      if (!outcomeTracker) {
        alert('❌ Outcome tracker not initialized');
        return;
      }

      const records = outcomeTracker.getAllRecords();
      const results = document.getElementById('resultsContent');

      if (records.length === 0) {
        results.innerHTML = '<p>No training data collected yet.</p><p>Click "Generate Training Data" to create samples.</p>';
      } else {
        results.innerHTML = `
          <p><strong>Training Data Records: ${records.length}</strong></p>
          <pre>${JSON.stringify(records.slice(0, 3), null, 2)}</pre>
          <p style="color: #6b7280; font-size: 14px;">Showing first 3 records. Open browser console and run <code>window.outcomeTracker.getAllRecords()</code> to see all.</p>
        `;
      }

      document.getElementById('results').style.display = 'block';
    }

    async function deleteModel() {
      if (!mlModel) {
        alert('❌ ML model not initialized');
        return;
      }

      const confirm = window.confirm('Delete ML model and all training data?\n\nThis will:\n- Remove trained neural network\n- Delete all collected optimization records\n- Reset to rule-based mode\n\nThis action cannot be undone.');

      if (!confirm) return;

      try {
        await mlModel.deleteModel();
        if (outcomeTracker) {
          localStorage.removeItem('we_optimization_outcomes');
          outcomeTracker.records = [];
        }

        const results = document.getElementById('resultsContent');
        results.innerHTML = '<p>✅ <strong>Model and data deleted successfully.</strong></p><p>System reset to rule-based mode.</p>';
        document.getElementById('results').style.display = 'block';

        await checkSystem();
      } catch (error) {
        alert(`Error deleting model: ${error.message}`);
      }
    }
  </script>
</body>
</html>
