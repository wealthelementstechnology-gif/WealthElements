<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Financial Calculator Dashboard</title>
    <link rel="stylesheet" href="../design-system.css">
    <link rel="stylesheet" href="../8-events-calculator/8-events.css">
    <script src="../theme.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calculator.css">
</head>
<body>

<main class="container">
    
    <!-- Step 0: Dashboard -->
    <section id="step-0" class="step active">
        <header class="page-header">
            <button id="calc-back-main" class="btn back btn-sm" aria-label="Back">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Back
            </button>
            <div>
                <h1>Financial Calculator Dashboard</h1>
                <p class="subtitle">Choose a calculator to get started</p>
            </div>
        </header>
        
        <div id="dashboard-grid" class="calculator-grid">
            <!-- Buttons are generated by JS -->
        </div>
    </section>

    <!-- Calculator Pages (Generated by JS) -->
    <div id="calculator-pages"></div>

</main>

<script src="calculator.js"></script>
</body>
</html>
